<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WF861TCVBP"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-WF861TCVBP');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BexleyMesh - A community project to build off-grid mesh networks">
    
    <title>BexleyMesh - Post</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="BexleyMesh.svg">
    <link rel="apple-touch-icon" href="BexleyMesh.svg">
    <!-- Note: Using Tailwind CDN for Phase 1. For production, install as PostCSS plugin. -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/custom.css">
    <script>
        // Suppress Tailwind CDN warning for Phase 1 development
        if (typeof Proxy !== 'undefined') {
            window.matchMedia = new Proxy(window.matchMedia, {
                apply(target, thisArg, args) {
                    return Reflect.apply(target, thisArg, args);
                }
            });
        }
        
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: {
                        'xl2': '1200px'
                    },
                    colors: {
                        mesh: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            300: '#86efac',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            900: '#14532d',
                            dark: '#0f172a',
                            card: '#1e293b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }

        .mesh-gradient {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .node-pulse {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }
    </style>
</head>
<body class="bg-mesh-dark text-slate-300 font-sans antialiased selection:bg-mesh-500 selection:text-white">

    <!-- Navigation (rendered by components.js) -->
    <div id="nav-component"></div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">
        <div id="post-container" class="min-h-screen">
            <!-- Post content will be loaded here -->
            <div class="text-center py-12">
                <p class="text-slate-400">Loading post...</p>
            </div>
        </div>

        <!-- Navigation Between Posts -->
        <div id="post-nav" class="mt-16 pt-8 border-t border-slate-800 grid md:grid-cols-2 gap-8">
            <!-- Previous/Next post links will be generated here -->
        </div>
    </div>

    <!-- Footer (rendered by components.js) -->
    <div id="footer-component"></div>

    <!-- Scripts -->
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script>
        async function initPostPage() {
            const slug = getQueryParam('post');
            
            if (!slug) {
                document.getElementById('post-container').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-red-400">No post specified</p>
                        <a href="blog.html" class="text-mesh-500 hover:text-mesh-300">Back to posts</a>
                    </div>
                `;
                return;
            }

            await blogManager.loadPosts();
            const post = blogManager.getPostBySlug(slug);

            if (!post) {
                document.getElementById('post-container').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-red-400">Post not found</p>
                        <a href="blog.html" class="text-mesh-500 hover:text-mesh-300">Back to posts</a>
                    </div>
                `;
                return;
            }

            // Update page title and meta tags
            document.title = `${post.title} - BexleyMesh`;
            document.querySelector('meta[name="description"]').setAttribute('content', post.excerpt);

            // Render the post
            renderPostDetail(post, document.getElementById('post-container'));

            // Render navigation
            const currentIndex = blogManager.posts.indexOf(post);
            const prevPost = currentIndex < blogManager.posts.length - 1 ? blogManager.posts[currentIndex + 1] : null;
            const nextPost = currentIndex > 0 ? blogManager.posts[currentIndex - 1] : null;

            let navHtml = '';
            if (prevPost) {
                navHtml += `
                    <div class="text-left">
                        <a href="post.html?post=${prevPost.slug}" class="group">
                            <p class="text-mesh-500 text-sm mb-2">&larr; Previous Post</p>
                            <p class="text-white font-bold group-hover:text-mesh-300">${prevPost.title}</p>
                        </a>
                    </div>
                `;
            } else {
                navHtml += '<div></div>';
            }

            if (nextPost) {
                navHtml += `
                    <div class="text-right">
                        <a href="post.html?post=${nextPost.slug}" class="group">
                            <p class="text-mesh-500 text-sm mb-2">Next Post &rarr;</p>
                            <p class="text-white font-bold group-hover:text-mesh-300">${nextPost.title}</p>
                        </a>
                    </div>
                `;
            } else {
                navHtml += '<div></div>';
            }

            document.getElementById('post-nav').innerHTML = navHtml;
        }

        document.addEventListener('DOMContentLoaded', initPostPage);
    </script>
</body>
</html>
